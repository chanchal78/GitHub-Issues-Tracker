<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="styles/tailwind.init.css">
    <style>
        *{
            font-family: 'Geist', sans-serif;
        }
    </style>
</head>

</head>

<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen">

    <section class=" w-[520px] p-8 rounded-xl bg-white shadow-sm text-center">

        <div class="flex justify-center mb-4">
            <div>
                <img src="assets/github-logo.png" alt="github logo">
            </div>
        </div>

        <div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-500 mb-6">Sign in to manage your issues</p>
        </div>

        <div class="text-left mb-3">
            <label for="username" class="font-semibold">Username</label>
            <input id="username" type="text" name="username" placeholder="Enter Username"
            class="w-full mt-1 border rounded-md p-2">
            <p class="text-xs text-[#4A00FF] mt-1">Default: admin</p>
        </div>

        <div class="text-left mb-4">
            <label for="password" class="font-semibold">Password</label>
            <input id="password" type="password" name="password" placeholder="Enter Password"
            class="w-full mt-1 border rounded-md p-2">
            <p class="text-xs text-[#4A00FF] mt-1">Default: admin123</p>
        </div>

        <p id="error-message" class="text-xs text-red-500 flex hidden">Invalid username or password</p>
        <button type="submit" id="sign-in-btn" class="btn btn-primary w-full rounded-md bg-[#4A00FF]">Sign In</button>

        <div class="flex items-center gap-2 my-4">
            <hr class="flex-grow border-gray-300">
            <span class="text-gray-700">OR</span>
            <hr class="flex-grow border-gray-300">
        </div>

        <div class="">
            <p class="text-xs text-gray-500">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] p-5">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>

    </section>

    <script src="js/login.js"></script>
</body>
</html>
