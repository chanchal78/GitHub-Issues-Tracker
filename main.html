<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="styles/tailwind.init.css">
    <style>
        *{
            font-family: 'Geist', sans-serif;
        }
        .btn-primary{
            background-color: #4A00FF;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body class=" bg-[#F8FAFC]">
    <!-- <h2>This is main page</h2> -->
     <header>

        <section id="navbar" class="flex justify-between px-[80px] py-[16px] bg-white border-1 border-gray-300">

                <div class="flex text-center items-center gap-1">
                    <img class="size-[36px]" src="assets/github-logo.png" alt="github logo">
                    <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
                </div>

                <div class="flex gap-3">

                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" type="search" placeholder="Search" />
                    </label>

                    <button class="btn btn-active btn-primary"><span class="text-2xl">+</span> New Issues</button>

                </div>

        </section>

     </header>

     <main class="my-[60px] mx-[245px]">

        <section id="tabs-section" class="flex gap-3 bg-white p-5 rounded-md shadow-sm">
            <button class="btn btn-primary w-[120px] text-white text-[#64748B]">All</button>
            <button class="btn btn-outline w-[120px] text-[#64748B]">Open</button>
            <button class="btn btn-outline w-[120px] text-[#64748B]">Closed</button>
        </section>

        <section id="issues-section" class="">

            <div class="flex justify-between p-5 bg-white shadow-sm mt-4 rounded-t-md">
                <div class="flex gap-2 items-center content-center ">
                    <div class="bg-purple-200 p-2 rounded-4xl">
                        <img class="w-[32px] h-[32px]" src="assets/Aperture.png" alt="Aperture png">
                    </div>
                    <div>
                        <h2 class="text-[20px] font-semibold">0 Issues</h2>
                        <p class="text-nowrap text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center content-center gap-4">
                    <div class="flex items-center content-center gap-1">
                        <span class="border-6 h-2 border-green-700 rounded-lg"></span>
                        <p>Open</p>
                    </div>
                    <div class="flex items-center content-center gap-1">
                        <span class="border-6 border-purple-700 rounded-lg"></span>
                        <p>Closed</p>
                    </div>
                </div>
            </div>

            <div id="cards-container" class="grid grid-cols-4 gap-6 bg-[#FBFBFB] p-5"></div>
                
                <div>

                    

                </div>

            </div>

        </section>

     </main>


    <script src="js/main.js"></script>
</body>
</html>
